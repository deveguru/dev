<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML File Manager (UI Only)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { margin-top: 0; font-size: 24px; color: #2c3e50; }
        .breadcrumb { padding: 10px; background: #ecf0f1; border-radius: 4px; margin-bottom: 20px; word-break: break-all; }
        .breadcrumb a { color: #2980b9; text-decoration: none; }
        .breadcrumb a:hover { text-decoration: underline; }
        .controls { display: flex; gap: 20px; margin-bottom: 20px; flex-wrap: wrap; }
        .control-group { background: #f9f9f9; padding: 15px; border-radius: 6px; border: 1px solid #eee; flex: 1; min-width: 250px; }
        .control-group h3 { margin: 0 0 10px 0; font-size: 16px; }
        input[type="text"], input[type="file"] { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #3498db; color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2980b9; }
        .btn-danger { background: #e74c3c; }
        .btn-danger:hover { background: #c0392b; }
        .btn-warning { background: #f1c40f; color: #333; }
        .btn-warning:hover { background: #f39c12; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        tr:hover { background: #f1f4f6; }
        .icon { margin-right: 8px; font-size: 18px; }
        a.item-link { text-decoration: none; color: #2c3e50; font-weight: 500; }
        a.item-link:hover { color: #3498db; }
        .actions { display: flex; gap: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>File Manager</h1>

    <div class="breadcrumb">
        <strong>Path:</strong> 
        <a href="#">Root</a> / <a href="#">Documents</a> / <a href="#">Projects</a>
    </div>

    <div class="controls">
        <div class="control-group">
            <h3>Upload File</h3>
            <form onsubmit="event.preventDefault(); alert('Backend required for upload');">
                <input type="file" required>
                <button type="submit">Upload</button>
            </form>
        </div>
        <div class="control-group">
            <h3>Create Directory</h3>
            <form onsubmit="event.preventDefault(); alert('Backend required to create directory');">
                <input type="text" placeholder="Directory Name" required>
                <button type="submit">Create</button>
            </form>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Name</th>
                <th>Size</th>
                <th>Modified</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td><a href="#" class="item-link"><span class="icon">📁</span>..</a></td>
                <td>-</td>
                <td>-</td>
                <td>-</td>
            </tr>

            <tr>
                <td><a href="#" class="item-link"><span class="icon">📁</span>Images</a></td>
                <td>-</td>
                <td>2026-04-23 10:15</td>
                <td class="actions">
                    <button class="btn-warning" onclick="renameItem('Images')">Rename</button>
                    <button class="btn-danger" onclick="deleteItem('Images')">Delete</button>
                </td>
            </tr>

            <tr>
                <td><span class="icon">📄</span>report.pdf</td>
                <td>2.45 MB</td>
                <td>2026-04-20 14:30</td>
                <td class="actions">
                    <button onclick="alert('Backend required to download')">Download</button>
                    <button class="btn-warning" onclick="renameItem('report.pdf')">Rename</button>
                    <button class="btn-danger" onclick="deleteItem('report.pdf')">Delete</button>
                </td>
            </tr>
            
            <tr>
                <td><span class="icon">📄</span>style.css</td>
                <td>14.2 KB</td>
                <td>2026-04-22 09:00</td>
                <td class="actions">
                    <button onclick="alert('Backend required to download')">Download</button>
                    <button class="btn-warning" onclick="renameItem('style.css')">Rename</button>
                    <button class="btn-danger" onclick="deleteItem('style.css')">Delete</button>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script>
function renameItem(currentName) {
    let newName = prompt("Enter new name:", currentName);
    if (newName !== null && newName.trim() !== "" && newName !== currentName) {
        alert("Backend API call required to rename '" + currentName + "' to '" + newName + "'");
    }
}

function deleteItem(itemName) {
    if (confirm("Are you sure you want to delete '" + itemName + "'?")) {
        alert("Backend API call required to delete '" + itemName + "'");
    }
}
</script>

</body>
</html>
